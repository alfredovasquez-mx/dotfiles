# ==========================================================
# Tmux config (macOS-friendly, clean defaults, plugin-based)
# ==========================================================

# Terminal + colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",tmux-256color:cstyle"
set -as terminal-features ",*:RGB"
set -sg escape-time 10
set -g history-limit 100000

# General behavior
set -g mouse on
set -g focus-events on
set -g detach-on-destroy off
set -g renumber-windows on
set -g allow-rename off
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
setw -g automatic-rename off
set -g set-clipboard on
setw -g aggressive-resize off
setw -g window-size largest

# Prefix (single): Ctrl+Space
unbind C-b
unbind C-a
set -g prefix C-Space
set -gu prefix2
bind C-Space send-prefix

# Better splits (open in current pane path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation + resize
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Window navigation
bind -r H previous-window
bind -r L next-window

# Session navigation via sesh
bind s run-shell "~/.config/tmux/scripts/sesh-popup.sh"
bind S command-prompt -p "session name or path" "run-shell '~/.config/tmux/scripts/sesh-connect.sh \"%%\"'"
bind O run-shell "sesh last"
bind 9 run-shell "~/.config/tmux/scripts/sesh-connect.sh --root '#{pane_current_path}'"
bind "(" switch-client -p
bind ")" switch-client -n
bind K confirm-before -p "kill session #S? (y/n)" "kill-session"

# Quality-of-life
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind w choose-tree -Zw
bind z resize-pane -Z
bind = resize-window -A \; setw window-size largest \; display-message "tmux window resized to current client"
bind x kill-pane
bind X kill-window

# Copy-mode (vim-like)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# UI
set -g status-position top
set -g status on
set -g status-interval 10
set -g status-left-length 60
set -g status-right-length 120
set -g popup-border-lines rounded

# Plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "wfxr/tmux-fzf-url"
set -g @plugin "fcsonline/tmux-thumbs"
set -g @plugin "uhs-robert/tmux-oasis"
set -g @plugin "tmux-plugins/tmux-continuum"

# Plugin options
set -g @yank_selection "clipboard"
set -g @continuum-restore "off"
set -g @continuum-save-interval "30"
set -g @resurrect-capture-pane-contents "off"
set -g @resurrect-strategy-nvim "session"
set -g @oasis_flavor "kanagawa_dragon_dark"
set -g @oasis_mode_format "short"
set -gu @ukiyo-theme
set -gu @ukiyo-ignore-window-colors

run "~/.config/tmux/plugins/tpm/tpm"
source-file "~/.config/tmux/plugins/tmux-oasis/oasis_tmux.conf"
run-shell "sh ~/.config/tmux/scripts/rename-windows.sh"

# Resize windows to the active client when switching or after a client resize.
set-hook -g client-attached 'set -g default-size #{client_width}x#{client_height}; resize-window -A; setw window-size largest'
set-hook -g client-session-changed 'resize-window -A; setw window-size largest'
set-hook -g client-resized 'resize-window -A; setw window-size largest'
set-hook -g after-new-window 'run-shell "sh ~/.config/tmux/scripts/rename-windows.sh"'
set-hook -g after-select-window 'run-shell "~/.config/tmux/scripts/sesh-connect.sh --start-current-window"; run-shell "sh ~/.config/tmux/scripts/rename-windows.sh"'
set-hook -g after-select-pane 'run-shell "sh ~/.config/tmux/scripts/rename-windows.sh"'
set-hook -g after-split-window 'run-shell "sh ~/.config/tmux/scripts/rename-windows.sh"'

# Stability overrides after plugin initialization.
setw -g aggressive-resize off
setw -g window-size largest
set -g status-interval 10
set -g window-status-separator ""
set -g @codex_window_status_icon '#{?#{==:#{@codex_sesh_state},starting}, 󰔛,#{?#{==:#{@codex_sesh_state},pending-preload}, 󰮫,#{?#{==:#{@codex_sesh_state},pending-bg}, 󱥸,#{?#{==:#{@codex_sesh_state},pending-late}, ,#{?#{==:#{@codex_sesh_state},pending-lazy}, ,}}}}}'
set -g window-status-separator " "
set -g window-status-format '#[fg=#{@thm_strong_primary},bg=default]#[fg=#{@thm_core},bg=#{@thm_strong_primary},bold] #I #[fg=#{@thm_fg},bg=#{@thm_surface}] #W#[fg=#{@thm_primary},bg=#{@thm_surface}]#{E:@codex_window_status_icon} #[fg=#{@thm_surface},bg=default]'
set -g window-status-current-format '#[fg=#{@thm_secondary},bg=default]#[fg=#{@thm_core},bg=#{@thm_secondary},bold] #I #[fg=#{@thm_secondary},bg=#{@thm_surface},bold] #W#[fg=#{@thm_yellow},bg=#{@thm_surface}]#{E:@codex_window_status_icon}#{?window_zoomed_flag, 󰁌,} #[fg=#{@thm_surface},bg=default]'
set -g status-format[0] ' #[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default] '
set -gu status-format[1]
set -gu status-format[2]
set -g popup-style "bg=default,fg=#a6a69c"
set -g popup-border-style "bg=default,fg=#54546d"
