# ==========================================================
# Tmux config (macOS-friendly, clean defaults, plugin-based)
# ==========================================================

# Terminal + colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -sg escape-time 10
set -g history-limit 100000

# General behavior
set -g mouse on
set -g focus-events on
set -g detach-on-destroy off
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g set-clipboard on
setw -g aggressive-resize off
setw -g window-size largest

# Prefix (single): Ctrl+Space
unbind C-b
unbind C-a
set -g prefix C-Space
set -gu prefix2
bind C-Space send-prefix

# Better splits (open in current pane path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation + resize
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Window navigation
bind -r H previous-window
bind -r L next-window

# Session navigation
bind s choose-tree -Zs
bind S command-prompt -I "main" "new-session -A -s '%%'"
bind "(" switch-client -p
bind ")" switch-client -n
bind K confirm-before -p "kill session #S? (y/n)" "kill-session"

# Quality-of-life
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind w choose-tree -Zw
bind z resize-pane -Z
bind = resize-window -A \; setw window-size largest \; display-message "tmux window resized to current client"
bind x kill-pane
bind X kill-window

# Copy-mode (vim-like)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# UI
set -g status-position top
set -g status-interval 10
set -g status-left-length 60
set -g status-right-length 120

# Plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "wfxr/tmux-fzf-url"
set -g @plugin "fcsonline/tmux-thumbs"
set -g @plugin "uhs-robert/tmux-oasis"
set -g @plugin "tmux-plugins/tmux-continuum"

# Plugin options
set -g @yank_selection "clipboard"
set -g @continuum-restore "on"
set -g @continuum-save-interval "30"
set -g @resurrect-capture-pane-contents "off"
set -g @resurrect-strategy-nvim "session"
set -g @oasis_flavor "kanagawa_dragon_dark"
set -g @oasis_mode_format "short"
set -gu @ukiyo-theme
set -gu @ukiyo-ignore-window-colors

run "~/.config/tmux/plugins/tpm/tpm"
source-file "~/.config/tmux/plugins/tmux-oasis/oasis_tmux.conf"
run-shell "sh ~/.config/tmux/plugins/tmux-oasis/status/scripts/rename_windows.sh"

# Resize windows to the active client when switching or after a client resize.
set-hook -g client-session-changed 'resize-window -A; setw window-size largest'
set-hook -g client-resized 'resize-window -A; setw window-size largest'
set-hook -g after-new-window 'run-shell "sh ~/.config/tmux/plugins/tmux-oasis/status/scripts/rename_windows.sh"'
set-hook -g after-select-window 'run-shell "sh ~/.config/tmux/plugins/tmux-oasis/status/scripts/rename_windows.sh"'
set-hook -g after-select-pane 'run-shell "sh ~/.config/tmux/plugins/tmux-oasis/status/scripts/rename_windows.sh"'
set-hook -g after-split-window 'run-shell "sh ~/.config/tmux/plugins/tmux-oasis/status/scripts/rename_windows.sh"'

# Stability overrides after plugin initialization.
setw -g aggressive-resize off
setw -g window-size largest
set -g status-interval 10
